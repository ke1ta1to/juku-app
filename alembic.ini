[alembic]
script_location = alembic
prepend_sys_path = .
# ↓ この値は alembic/env.py で settings.DATABASE_URL に上書きされる。
#   直接ここを変えなくても .env の DATABASE_URL が効く。
sqlalchemy.url = sqlite:///./juku.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
